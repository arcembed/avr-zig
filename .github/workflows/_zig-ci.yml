name: Zig CI

on:
  workflow_call:
    inputs:
      zig-version:
        description: Zig version to install. Leave empty to resolve from build.zig.zon.
        required: false
        type: string
        default: ""

defaults:
  run:
    shell: bash

jobs:
  discover-examples:
    name: Discover examples
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      examples: ${{ steps.collect.outputs.examples }}
    steps:
      - uses: actions/checkout@v6

      - name: Collect example matrix
        id: collect
        run: |
          set -euo pipefail

          mapfile -t examples < <(
            find examples \
              -mindepth 1 \
              -maxdepth 1 \
              -type d \
              -exec test -f '{}/build.zig' ';' \
              -printf '%f\n' \
              | sort
          )

          json="["
          separator=""
          for example in "${examples[@]}"; do
            json+="${separator}\"${example}\""
            separator=","
          done
          json+="]"

          echo "examples=${json}" >> "${GITHUB_OUTPUT}"

  fmt:
    name: Fmt check
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ inputs.zig-version }}
          cache-key: fmt

      - name: Check formatting
        run: zig fmt --check build.zig build.zig.zon build_support src examples

  check:
    name: Check (${{ matrix.board }})
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        board:
          - uno
          - nano
          - mega2560
    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ inputs.zig-version }}
          cache-key: check-${{ matrix.board }}

      - name: Build root package
        run: zig build check -Dboard=${{ matrix.board }}

  examples:
    name: Example ${{ matrix.example }} (${{ matrix.board }})
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: discover-examples
    if: ${{ needs.discover-examples.outputs.examples != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        board:
          - uno
          - nano
          - mega2560
        example: ${{ fromJSON(needs.discover-examples.outputs.examples) }}
    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ inputs.zig-version }}
          cache-key: example-${{ matrix.example }}-${{ matrix.board }}

      - name: Build example
        working-directory: examples/${{ matrix.example }}
        run: zig build -Dboard=${{ matrix.board }}
